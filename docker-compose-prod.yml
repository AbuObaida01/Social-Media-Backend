version: "3"

services:
  api:
    image: abuObaida01/fastapi
    depends_on:
      - postgres
    ports:
      - 80:8000
    restart: always
    # volumes:
    #   - ./:/usr/src/app:ro
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: fastapi
    volumes:
      - postgres-db:/var/lib/postgresql/data

volumes:
  postgres-db: